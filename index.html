<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогноз погоды</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="weather-app">
        <h1 class="title">☀️ Прогноз погоды</h1>

        <!-- Поиск города -->
        <div class="search-box">
          <input
            type="text"
            id="cityInput"
            placeholder="Введите название города..."
            class="search-input"
          />
          <button id="searchBtn" class="search-btn">Найти</button>
          <button
            id="locationBtn"
            class="location-btn"
            title="Моё местоположение"
          >
            📍
          </button>
        </div>

        <!-- Сообщение об ошибке -->
        <div id="errorMessage" class="error-message hidden">
          <!-- Здесь будет текст ошибки -->
        </div>

        <!-- Индикатор загрузки -->
        <div id="loading" class="loading hidden">
          <div class="spinner"></div>
          <p>Загрузка...</p>
        </div>

        <!-- Основная информация о погоде -->
        <div id="weatherInfo" class="weather-info hidden">
          <div class="location">
            <h2 id="cityName"><!-- Название города --></h2>
            <p id="country"><!-- Страна --></p>
          </div>

          <div class="weather-main">
            <img
              id="weatherIcon"
              src=""
              alt="Weather icon"
              class="weather-icon"
            />
            <div class="temperature">
              <h1 id="temp"><!-- Температура --></h1>
              <div class="temp-toggle">
                <button id="celsiusBtn" class="active">°C</button>
                <button id="fahrenheitBtn">°F</button>
              </div>
            </div>
            <p id="description" class="description"><!-- Описание --></p>
          </div>

          <div class="weather-details">
            <div class="detail-item">
              <span class="detail-icon">💧</span>
              <div class="detail-info">
                <p class="detail-label">Влажность</p>
                <p id="humidity" class="detail-value"><!-- Влажность --></p>
              </div>
            </div>

            <div class="detail-item">
              <span class="detail-icon">💨</span>
              <div class="detail-info">
                <p class="detail-label">Ветер</p>
                <p id="windSpeed" class="detail-value">
                  <!-- Скорость ветра -->
                </p>
              </div>
            </div>

            <div class="detail-item">
              <span class="detail-icon">🌡️</span>
              <div class="detail-info">
                <p class="detail-label">Ощущается</p>
                <p id="feelsLike" class="detail-value">
                  <!-- Ощущается как -->
                </p>
              </div>
            </div>

            <div class="detail-item">
              <span class="detail-icon">👁️</span>
              <div class="detail-info">
                <p class="detail-label">Видимость</p>
                <p id="visibility" class="detail-value"><!-- Видимость --></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Прогноз на 5 дней (бонус) -->
        <div id="forecast" class="forecast hidden">
          <h3 class="forecast-title">Прогноз на 5 дней</h3>
          <div id="forecastCards" class="forecast-cards">
            <!-- Карточки прогноза будут добавлены через JS -->
          </div>
        </div>
      </div>
    </div>

    <script src="/src/app.js"></script>
  </body>
</html>
